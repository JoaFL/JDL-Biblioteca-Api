spring.application.name=Biblioteca

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/dbbibliotecaocS?allowPublicKeyRetrieval=true&useSSL=false&disabledAuthenticationPlugins=com.mysql.cj.protocol.a.authentication.AuthenticationGssapiClientPlugin,com.mysql.cj.protocol.a.authentication.AuthenticationKerberosClientPlugin
spring.datasource.username=root
spring.datasource.password= 
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA and Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true